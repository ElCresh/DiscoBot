<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiscoBot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { color: #e94560; margin-bottom: 20px; font-size: 2em; }
        .card {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 16px;
        }
        .now-playing {
            text-align: center;
        }
        .now-playing .title {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 8px;
            color: #e94560;
            min-height: 1.6em;
        }
        .now-playing .time {
            color: #aaa;
            font-size: 0.9em;
            margin-bottom: 12px;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #0f3460;
            border-radius: 3px;
            cursor: pointer;
            margin-bottom: 16px;
        }
        .progress-bar .fill {
            height: 100%;
            background: #e94560;
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .controls button {
            background: #0f3460;
            border: none;
            color: #eee;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.3em;
            cursor: pointer;
            transition: background 0.2s;
        }
        .controls button:hover { background: #e94560; }
        .controls button.play-btn { width: 60px; height: 60px; font-size: 1.5em; }
        .volume {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }
        .volume input[type="range"] {
            width: 150px;
            accent-color: #e94560;
        }
        .volume span { font-size: 0.9em; color: #aaa; width: 35px; }
        .add-track {
            display: flex;
            gap: 8px;
        }
        .add-track input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #0f3460;
            background: #1a1a2e;
            color: #eee;
            font-size: 0.95em;
        }
        .add-track input::placeholder { color: #666; }
        .add-track button, .type-toggle button {
            padding: 10px 16px;
            border-radius: 8px;
            border: none;
            background: #e94560;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
        }
        .add-track button:hover { background: #c73650; }
        .type-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .type-toggle button {
            flex: 1;
            background: #0f3460;
        }
        .type-toggle button.active { background: #e94560; }
        .queue-list {
            list-style: none;
        }
        .queue-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #1a1a2e;
            border-radius: 8px;
            margin-bottom: 6px;
        }
        .queue-list li .track-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-right: 10px;
        }
        .queue-list li .track-type {
            font-size: 0.75em;
            background: #0f3460;
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 8px;
        }
        .queue-list li button {
            background: none;
            border: none;
            color: #e94560;
            cursor: pointer;
            font-size: 1.1em;
            padding: 4px;
        }
        .card h2 {
            font-size: 1em;
            color: #aaa;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .queue-list li .drag-handle {
            cursor: grab;
            color: #555;
            font-size: 1.2em;
            margin-right: 8px;
            user-select: none;
        }
        .queue-list li .drag-handle:active { cursor: grabbing; }
        .queue-list li .move-btn {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 1em;
            padding: 4px;
        }
        .queue-list li .move-btn:hover { color: #e94560; }
        .queue-list li.dragging { opacity: 0.4; }
        .queue-list li.drag-over {
            border: 2px dashed #e94560;
            background: #1e2a4a;
        }
        .empty-queue {
            text-align: center;
            color: #555;
            padding: 20px;
        }
        .media-list {
            list-style: none;
            max-height: 250px;
            overflow-y: auto;
        }
        .media-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            background: #1a1a2e;
            border-radius: 8px;
            margin-bottom: 6px;
        }
        .media-list li span {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-right: 10px;
            font-size: 0.9em;
        }
        .media-list li button {
            background: #e94560;
            border: none;
            color: #fff;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            flex-shrink: 0;
        }
        .media-list li button:hover { background: #c73650; }
        .upload-form {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .upload-form input[type="file"] {
            flex: 1;
            font-size: 0.85em;
            color: #aaa;
        }
        .upload-form button {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            background: #e94560;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
            white-space: nowrap;
        }
        .upload-form button:hover { background: #c73650; }
        .empty-media {
            text-align: center;
            color: #555;
            padding: 20px;
        }
        .history-list {
            list-style: none;
            max-height: 250px;
            overflow-y: auto;
        }
        .history-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            background: #1a1a2e;
            border-radius: 8px;
            margin-bottom: 6px;
        }
        .history-list li .track-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-right: 10px;
            font-size: 0.9em;
        }
        .history-list li .track-type {
            font-size: 0.75em;
            background: #0f3460;
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 8px;
            flex-shrink: 0;
        }
        .history-list li .track-time {
            color: #666;
            font-size: 0.75em;
            margin-right: 8px;
            flex-shrink: 0;
        }
        .history-list li button {
            background: #0f3460;
            border: none;
            color: #fff;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: bold;
            flex-shrink: 0;
        }
        .history-list li button:hover { background: #e94560; }
        .empty-history {
            text-align: center;
            color: #555;
            padding: 20px;
        }
        #clearHistoryBtn {
            width: 100%;
            margin-top: 10px;
            padding: 8px;
            border-radius: 8px;
            border: none;
            background: #0f3460;
            color: #aaa;
            cursor: pointer;
            font-size: 0.85em;
        }
        #clearHistoryBtn:hover { background: #e94560; color: #fff; }
    </style>
</head>
<body>
    <h1>DiscoBot</h1>

    <!-- Now Playing -->
    <div class="card now-playing">
        <div class="title" id="trackTitle">Nessuna traccia</div>
        <div class="time">
            <span id="currentTime">0:00</span> / <span id="totalTime">0:00</span>
        </div>
        <div class="progress-bar" id="progressBar">
            <div class="fill" id="progressFill"></div>
        </div>
        <div class="controls">
            <button onclick="api('/player/previous', 'POST')">&#9198;</button>
            <button onclick="api('/player/stop', 'POST')">&#9209;</button>
            <button class="play-btn" id="playPauseBtn" onclick="togglePlayPause()">&#9654;</button>
            <button onclick="api('/player/skip', 'POST')">&#9197;</button>
        </div>
        <div class="volume">
            <span>&#128264;</span>
            <input type="range" id="volumeSlider" min="0" max="100" value="80"
                   oninput="api('/player/volume?volume=' + this.value, 'POST')">
            <span id="volumeLabel">80</span>
        </div>
    </div>

    <!-- Add Track -->
    <div class="card">
        <h2>Aggiungi Traccia</h2>
        <div class="type-toggle">
            <button id="btnLocal" class="active" onclick="setType('local')">File Locale</button>
            <button id="btnYoutube" onclick="setType('youtube')">YouTube</button>
            <button id="btnSpotify" onclick="setType('spotify')" style="display:none">Spotify</button>
        </div>
        <!-- Visibile solo quando type=youtube -->
        <div class="add-track" id="youtubeInput" style="display:none">
            <input type="text" id="trackInput" placeholder="https://youtube.com/watch?v=...">
            <button onclick="addTrack()">+</button>
        </div>
        <!-- Visibile solo quando type=local -->
        <div id="localInput">
            <ul class="media-list" id="mediaList">
                <li class="empty-media">Nessun file nella libreria</li>
            </ul>
            <div class="upload-form">
                <input type="file" id="fileUpload" accept="audio/*,video/*">
                <button onclick="uploadFile()">Carica</button>
            </div>
        </div>
        <!-- Visibile solo quando type=spotify -->
        <div id="spotifyInput" style="display:none">
            <div class="add-track">
                <input type="text" id="spotifySearchInput" placeholder="Cerca su Spotify...">
                <button onclick="searchSpotify()">Cerca</button>
            </div>
            <ul class="media-list" id="spotifyResults">
                <li class="empty-media">Cerca un brano su Spotify</li>
            </ul>
        </div>
    </div>

    <!-- Queue -->
    <div class="card">
        <h2>Scaletta</h2>
        <ul class="queue-list" id="queueList">
            <li class="empty-queue">La scaletta è vuota</li>
        </ul>
    </div>

    <!-- Cronologia -->
    <div class="card">
        <h2>Cronologia</h2>
        <ul class="history-list" id="historyList">
            <li class="empty-history">Nessuna traccia nella cronologia</li>
        </ul>
        <button id="clearHistoryBtn" style="display:none" onclick="clearHistory()">Cancella Cronologia</button>
    </div>

    <script>
        let trackType = 'local';
        let isPlaying = false;

        function setType(type) {
            trackType = type;
            document.getElementById('btnLocal').classList.toggle('active', type === 'local');
            document.getElementById('btnYoutube').classList.toggle('active', type === 'youtube');
            document.getElementById('btnSpotify').classList.toggle('active', type === 'spotify');
            document.getElementById('youtubeInput').style.display = type === 'youtube' ? 'flex' : 'none';
            document.getElementById('localInput').style.display = type === 'local' ? 'block' : 'none';
            document.getElementById('spotifyInput').style.display = type === 'spotify' ? 'block' : 'none';
        }

        async function api(url, method = 'GET', body = null) {
            const opts = { method };
            if (body) {
                opts.headers = { 'Content-Type': 'application/json' };
                opts.body = JSON.stringify(body);
            }
            const res = await fetch(url, opts);
            return res.json();
        }

        async function refreshMedia() {
            try {
                const data = await api('/media/list');
                const list = document.getElementById('mediaList');
                if (data.files.length === 0) {
                    list.innerHTML = '<li class="empty-media">Nessun file nella libreria</li>';
                } else {
                    list.innerHTML = data.files.map(f =>
                        `<li>
                            <span>${f}</span>
                            <button onclick="addMediaToQueue('${f.replace(/'/g, "\\'")}')">+</button>
                        </li>`
                    ).join('');
                }
            } catch (e) {
                console.error('Media refresh failed:', e);
            }
        }

        async function addMediaToQueue(filename) {
            await api('/queue/add-media/' + encodeURIComponent(filename), 'POST');
            refreshState();
        }

        async function uploadFile() {
            const input = document.getElementById('fileUpload');
            if (!input.files.length) return;
            const formData = new FormData();
            formData.append('file', input.files[0]);
            await fetch('/media/upload', { method: 'POST', body: formData });
            input.value = '';
            refreshMedia();
        }

        async function addTrack() {
            const input = document.getElementById('trackInput');
            const url = input.value.trim();
            if (!url) return;
            await api('/queue/add', 'POST', { path: url, type: 'youtube' });
            input.value = '';
            refreshState();
        }

        async function searchSpotify() {
            const input = document.getElementById('spotifySearchInput');
            const query = input.value.trim();
            if (!query) return;
            const list = document.getElementById('spotifyResults');
            list.innerHTML = '<li class="empty-media">Ricerca in corso...</li>';
            try {
                const data = await api('/spotify/search?q=' + encodeURIComponent(query));
                if (data.results.length === 0) {
                    list.innerHTML = '<li class="empty-media">Nessun risultato</li>';
                } else {
                    list.innerHTML = data.results.map(r =>
                        `<li>
                            <span><strong>${r.title}</strong> — ${r.artist}<br><small style="color:#888">${r.album} · ${Math.floor(r.duration_ms/60000)}:${String(Math.floor((r.duration_ms%60000)/1000)).padStart(2,'0')}</small></span>
                            <button onclick="addSpotifyTrack('${r.spotify_id}')">+</button>
                        </li>`
                    ).join('');
                }
            } catch (e) {
                list.innerHTML = '<li class="empty-media">Errore nella ricerca</li>';
            }
        }

        async function addSpotifyTrack(spotifyId) {
            await api('/queue/add', 'POST', { path: spotifyId, type: 'spotify' });
            refreshState();
        }

        async function removeTrack(id) {
            await api('/queue/' + id, 'DELETE');
            refreshState();
        }

        async function moveTrack(id, position) {
            await api('/queue/' + id + '/move?position=' + position, 'POST');
            refreshState();
        }

        let draggedTrackId = null;

        function togglePlayPause() {
            api(isPlaying ? '/player/pause' : '/player/play', 'POST');
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return m + ':' + s.toString().padStart(2, '0');
        }

        async function refreshState() {
            try {
                const state = await api('/player/state');
                isPlaying = state.is_playing;

                // Now playing
                const title = state.current_track ? state.current_track.title : 'Nessuna traccia';
                document.getElementById('trackTitle').textContent = title;
                document.getElementById('currentTime').textContent = formatTime(state.position);
                document.getElementById('totalTime').textContent = formatTime(state.duration);
                document.getElementById('playPauseBtn').innerHTML = isPlaying ? '&#9208;' : '&#9654;';

                // Progress
                const pct = state.duration > 0 ? (state.position / state.duration * 100) : 0;
                document.getElementById('progressFill').style.width = pct + '%';

                // Volume
                document.getElementById('volumeSlider').value = state.volume;
                document.getElementById('volumeLabel').textContent = state.volume;

                // Queue
                const list = document.getElementById('queueList');
                if (state.queue.length === 0) {
                    list.innerHTML = '<li class="empty-queue">La scaletta è vuota</li>';
                } else {
                    const len = state.queue.length;
                    list.innerHTML = state.queue.map((t, i) =>
                        `<li draggable="true" data-track-id="${t.id}" data-index="${i}">
                            <span class="drag-handle">&#10303;</span>
                            <span class="track-type">${t.type === 'youtube' ? 'YT' : t.type === 'spotify' ? 'SP' : 'FILE'}</span>
                            <span class="track-name">${t.title}</span>
                            ${i > 0 ? `<button class="move-btn" onclick="moveTrack(${t.id}, ${i - 1})">&#8593;</button>` : ''}
                            ${i < len - 1 ? `<button class="move-btn" onclick="moveTrack(${t.id}, ${i + 1})">&#8595;</button>` : ''}
                            <button onclick="removeTrack(${t.id})">&#10005;</button>
                        </li>`
                    ).join('');

                    // Attach drag & drop events
                    list.querySelectorAll('li[draggable]').forEach(li => {
                        li.addEventListener('dragstart', (e) => {
                            draggedTrackId = li.dataset.trackId;
                            li.classList.add('dragging');
                            e.dataTransfer.effectAllowed = 'move';
                            e.dataTransfer.setData('text/plain', li.dataset.trackId);
                        });
                        li.addEventListener('dragend', () => {
                            li.classList.remove('dragging');
                            list.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
                            draggedTrackId = null;
                        });
                        li.addEventListener('dragover', (e) => {
                            e.preventDefault();
                            e.dataTransfer.dropEffect = 'move';
                            if (li.dataset.trackId !== draggedTrackId) {
                                li.classList.add('drag-over');
                            }
                        });
                        li.addEventListener('dragleave', () => {
                            li.classList.remove('drag-over');
                        });
                        li.addEventListener('drop', (e) => {
                            e.preventDefault();
                            li.classList.remove('drag-over');
                            const targetIndex = parseInt(li.dataset.index);
                            const srcId = e.dataTransfer.getData('text/plain');
                            if (srcId && li.dataset.trackId !== srcId) {
                                moveTrack(srcId, targetIndex);
                            }
                        });
                    });
                }
                refreshHistory();
            } catch (e) {
                console.error('Refresh failed:', e);
            }
        }

        async function refreshHistory() {
            try {
                const data = await api('/history');
                const list = document.getElementById('historyList');
                const btn = document.getElementById('clearHistoryBtn');
                if (data.history.length === 0) {
                    list.innerHTML = '<li class="empty-history">Nessuna traccia nella cronologia</li>';
                    btn.style.display = 'none';
                } else {
                    list.innerHTML = data.history.map((e, i) =>
                        `<li>
                            <span class="track-type">${e.track.type === 'youtube' ? 'YT' : e.track.type === 'spotify' ? 'SP' : 'FILE'}</span>
                            <span class="track-name">${e.track.title}</span>
                            <span class="track-time">${new Date(e.played_at).toLocaleTimeString()}</span>
                            <button onclick="requeueFromHistory(${i})">+ Coda</button>
                        </li>`
                    ).join('');
                    btn.style.display = 'block';
                }
            } catch (e) {
                console.error('History refresh failed:', e);
            }
        }

        async function requeueFromHistory(index) {
            await api('/history/' + index + '/requeue', 'POST');
            refreshState();
        }

        async function clearHistory() {
            if (!confirm('Cancellare tutta la cronologia?')) return;
            await api('/history', 'DELETE');
            refreshHistory();
        }

        // Seek on progress bar click
        document.getElementById('progressBar').addEventListener('click', async (e) => {
            const bar = e.currentTarget;
            const pct = e.offsetX / bar.offsetWidth;
            const state = await api('/player/state');
            if (state.duration > 0) {
                api('/player/seek?position=' + (pct * state.duration), 'POST');
            }
        });

        // Allow Enter key to add track
        document.getElementById('trackInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') addTrack();
        });

        // Enter key for Spotify search
        document.getElementById('spotifySearchInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') searchSpotify();
        });

        // Check if Spotify is configured and show button
        api('/spotify/status').then(data => {
            if (data.configured) {
                document.getElementById('btnSpotify').style.display = '';
            }
        });

        // Poll state every second
        setInterval(refreshState, 1000);
        refreshState();
        refreshMedia();
    </script>
</body>
</html>
